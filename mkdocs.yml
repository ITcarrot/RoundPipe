site_name: RoundPipe
site_url: https://itcarrot.github.io/RoundPipe/
repo_url: https://github.com/ITcarrot/RoundPipe/
nav:
  - Home: index.md
  - Tutorial: Tutorial.md
  - API:
      - Model: API/model.md
      - RunConfig: API/run_config.md
      - Context: API/context.md
      - Optimizer: API/optimizer.md
      - GradScaler: API/grad_scaler.md
  - Developer:
      - Internal APIs: Developer/internal_apis.md
theme: 
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  language: en
  features:
    - navigation.tabs
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - extra
  - admonition
  - pymdownx.details
  - pymdownx.superfences
plugins:
  - search
  - autorefs:
      resolve_closest: true
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            docstring_section_style: list
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
        - locale: zh
          name: 中文
          nav_translations:
            Home: 主页
            Tutorial: 教程
            Model: 模型
            RunConfig: 运行设置
            Context: 运行时上下文
            Optimizer: 优化器
            GradScaler: 梯度缩放器
            Developer: 开发者
            Internal APIs: 内部 API
